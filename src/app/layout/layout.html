<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top" style="background-color: var(--green) !important;">
    <div class="container-fluid">
        <!-- Hamburger Menu -->
        <button class="btn btn-link text-white d-lg-none me-2" (click)="toggleSidebar()" aria-label="Menu" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
            </svg>
        </button>

        <a class="navbar-brand page-title" routerLink="/">{{ 'La taverne de May' | uppercase}}</a>

    </div>
</nav>

<!-- Main Layout Container -->
<div class="layout-container">
    <!-- Sidebar Navigation (Desktop) -->
    <nav class="sidebar d-none d-lg-flex flex-column">
        <div class="d-flex justify-content-center mt-3">
            <img src="assets/may_picto.png" alt="May logo" class="logo-img"/>
        </div>

        <div class="p-3">
            <app-link display="btn" label="Créer une recette" routerLink="/recipes/add" iconName="create_recipe.png" iconSize="l"></app-link>

            <ul class="nav flex-column mt-2">
                @for (link of links; track link) {
                    <li class="nav-item mb-2">
                        <app-link display="list" (click)="goToAllRecipes(link.path)" [label]="link.title" [routerLink]="link.path" [iconName]="link.icon" iconSize="l"></app-link>
                    </li>
                }
            </ul>
        </div>
    </nav>

    <!-- Mobile Sidebar Offcanvas -->
    <div class="offcanvas offcanvas-start" [class.show]="isSidebarOpen()" tabindex="-1" id="offcanvasSidebar">
        @if (isSidebarOpen()) {
            <div class="offcanvas-backdrop fade show" (click)="closeSidebar()"></div>
        }
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Navigation</h5>
            <button type="button" class="btn-close" (click)="closeSidebar()" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0">
            <ul class="nav flex-column">
                @for (link of links; track link) {
                    <li class="nav-item">
                            <a class="nav-link" [routerLink]="link.path" routerLinkActive="active" (click)="goToAllRecipes(link.path); closeSidebar()">{{ link.title }}</a>
                    </li>
                }
            </ul>
        </div>
    </div>

    <section class="d-flex flex-column flex-grow-1 align-items-center justify-content-start">
        <app-search-filters></app-search-filters>

        <div class="content-wrapper">
            <router-outlet />
        </div>
    </section>
</div>
