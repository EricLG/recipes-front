<div class="search-filter-bar mb-4 p-3">
    <form [formGroup]="filterForm">
        <input class="form-control mb-2" type="text" placeholder="Recherche" aria-label="Recherche des recettes" formControlName="name" maxlength="40">
        <div class="select-row">
            <select class="form-select" aria-label="Filtrer par catégorie" formControlName="category">
                <option value="">Catégorie</option>
                @for (category of categories; track category[0]) {
                    <option [value]="category[0]">{{ category[1] }}</option>
                }
            </select>
            <select class="form-select" aria-label="Filtrer par saison" formControlName="season">
                <option value="">Saison</option>
                @for (season of seasons; track season[0]) {
                    <option [value]="season[0]">{{ season[1] }}</option>
                }
            </select>
            <select class="form-select" aria-label="Filtrer par type" formControlName="vegetarianStatus">
                <option value="">Tous les types</option>
                @for (option of vegetarianStatusOptions; track option[0]) {
                    <option [value]="option[0]">{{ option[1] }}</option>
                }
            </select>
        </div>
        <button type="button" class="btn btn-primary mt-2" (click)="resetFilters()">Reset</button>
    </form>
</div>
