<div class="modal-header">
    <h5 class="modal-title">{{ measure ? 'Modifier la portion' : 'Ajouter une portion' }}</h5>
    <button type="button" class="btn-close" (click)="cancel()"></button>
</div>
<div class="modal-body">
    <form [formGroup]="form">
        <div class="mb-3">
            <label for="label" class="form-label">Libellé</label>
            <input type="text" class="form-control" id="label" formControlName="label" required>
        </div>
        <div class="mb-3">
            <label for="grams" class="form-label">Grammes</label>
            <input type="number" class="form-control" id="grams" formControlName="grams" min="0.1" step="0.1" required>
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="isDefault" formControlName="isDefault">
            <label class="form-check-label" for="isDefault">Portion par défaut</label>
        </div>
    </form>
</div>
<div class="modal-footer d-flex justify-content-between">
    <button *ngIf="measure" type="button" class="btn btn-danger" (click)="delete()">Supprimer</button>
    <div>
        <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
        <button type="button" class="btn btn-primary" (click)="save()" [disabled]="!form.valid">Sauvegarder</button>
    </div>
</div>
