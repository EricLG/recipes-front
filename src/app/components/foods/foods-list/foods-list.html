<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Ingrédients</h2>
        <a class="btn btn-primary" routerLink="/foods/add">Ajouter un ingrédient</a>
    </div>

    <div class="list-group">
        @for (food of food$ | async; track $index) {
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" [routerLink]="['/foods', food.id]">
                <div>
                    <div class="fw-bold">{{ food.name }}</div>
                    <small class="text-muted">{{ food.nutrientsPer100.energyKcal }} kcal</small>
                </div>
                <span class="badge bg-secondary">Détails</span>
            </a>
        }
    </div>

</div>
