<div class="container mt-3">
  <h2>Ajouter une recette</h2>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="mb-3">
      <label class="form-label">Nom</label>
      <input class="form-control" formControlName="name" />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Parts</label>
        <input type="number" class="form-control" formControlName="nbParts" />
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Catégorie</label>
        <input class="form-control" formControlName="category" />
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Saison</label>
        <input class="form-control" formControlName="season" />
      </div>
      <div class="col-md-6 mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" formControlName="vegetarian" id="veg" />
          <label class="form-check-label" for="veg">Végétarien</label>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Instructions</label>
      <textarea class="form-control" rows="4" formControlName="instructions"></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Ingrédients</label>
      <div formArrayName="ingredients">
        <div *ngFor="let ing of ingredientsArray.controls; let i = index" [formGroupName]="i" class="border p-3 mb-2">
          <div class="row">
            <div class="col-md-4">
              <label class="form-label">Ingrédient</label>
              <select class="form-control" formControlName="ingredientId">
                <option value="">Sélectionner un ingrédient</option>
                <option *ngFor="let availIng of availableIngredients" [value]="availIng.id">{{ availIng.name }}</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">Quantité</label>
              <input type="number" class="form-control" formControlName="quantity" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Unité</label>
              <input class="form-control" formControlName="unit" />
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <button type="button" class="btn btn-danger" (click)="removeIngredient(i)">Supprimer</button>
            </div>
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-secondary" (click)="addIngredient()">Ajouter un ingrédient</button>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid">Créer</button>
      <a class="btn btn-secondary" routerLink="/">Annuler</a>
    </div>
  </form>
</div>
