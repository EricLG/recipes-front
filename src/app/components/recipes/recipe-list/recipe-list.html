<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Recettes</h2>
        <a class="btn btn-primary" routerLink="/recipes/add">Ajouter une recette</a>
    </div>

    <div class="list-group">
        @for (recipe of recipes$ | async; track $index) {
            <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" [routerLink]="['/recipes', recipe.id]">
                <div>
                    <div class="fw-bold">{{ recipe.name }}</div>
                    <small class="text-muted">{{ recipe.servings }} parts</small>
                </div>
                <span class="badge bg-secondary">Détails</span>
            </a>
        }
    </div>

</div>
